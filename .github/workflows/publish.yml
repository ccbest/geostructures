name: Publish to PyPI
# Publishes release tags (e.g. v0.14.0 or 0.14.0) whose version matches
# the VERSION file. Pre-release tags (rc/dev) are handled by the
# "Publish to Test PYPI" workflow instead.

on:
  push:
    tags:
      - '*'

permissions:
  contents: read

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    if: ${{ !contains(github.ref_name, 'rc') && !contains(github.ref_name, 'dev') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Upgrade build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Verify tag matches VERSION
        run: |
          VERSION_FILE="VERSION"
          if [ ! -f "$VERSION_FILE" ]; then
            echo "Missing $VERSION_FILE"; exit 1
          fi
          VERSION=$(tr -d ' \n' < "$VERSION_FILE")
          TAG="${GITHUB_REF_NAME#v}"     # strip optional leading 'v'
          echo "VERSION=$VERSION"
          echo "TAG=$TAG"
          if [ "$VERSION" != "$TAG" ]; then
            echo "Tag ($TAG) does not match VERSION ($VERSION)"; exit 1
          fi

      - name: Build sdist and wheel
        run: python -m build

      - name: Check dist artifacts (twine)
        run: twine check dist/*

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI }}
        run: twine upload dist/*
